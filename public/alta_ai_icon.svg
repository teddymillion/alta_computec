<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0d5f96" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="bgGrad" cx="45%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#1e9ed6"/>
      <stop offset="100%" stop-color="#0b5a8f"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8e020"/>
      <stop offset="100%" stop-color="#8eaa1a"/>
    </linearGradient>
  </defs>

  <!-- Float shadow -->
  <ellipse cx="50" cy="97" rx="22" ry="4" fill="#0a3d60" opacity="0.15"/>

  <!-- Main circle button -->
  <circle cx="50" cy="50" r="45" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="45" fill="url(#shine)"/>
  <circle cx="50" cy="50" r="45" fill="none" stroke="#b8d432" stroke-width="1.4" opacity="0.45"/>

  <!-- Stylized brain shape -->
  <g opacity="0.95">
    <!-- Left lobe -->
    <path d="M32 50 Q26 40 30 31 Q36 22 44 27 Q46 21 52 21 Q60 21 62 30 Q70 28 72 38 Q76 48 68 53 Q72 62 64 68 Q56 72 50 67 Q44 72 36 69 Q28 64 30 55 Q24 52 26 46 Q28 44 32 46Z"
          fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
    <!-- Center dividing line -->
    <line x1="50" y1="22" x2="50" y2="67" stroke="#ffffff" stroke-width="1" opacity="0.3" stroke-dasharray="2,3"/>
  </g>

  <!-- Neural nodes -->
  <circle cx="40" cy="36" r="2.2" fill="#b8d432" filter="url(#glow)"/>
  <circle cx="60" cy="37" r="2.2" fill="#b8d432" filter="url(#glow)"/>
  <circle cx="37" cy="54" r="2.2" fill="#b8d432" filter="url(#glow)"/>
  <circle cx="63" cy="55" r="2.2" fill="#b8d432" filter="url(#glow)"/>
  <circle cx="50" cy="46" r="3" fill="#ffffff" filter="url(#glow)"/>

  <!-- Connections to center -->
  <line x1="40" y1="36" x2="50" y2="46" stroke="#b8d432" stroke-width="1.1" opacity="0.75"/>
  <line x1="60" y1="37" x2="50" y2="46" stroke="#b8d432" stroke-width="1.1" opacity="0.75"/>
  <line x1="37" y1="54" x2="50" y2="46" stroke="#b8d432" stroke-width="1.1" opacity="0.75"/>
  <line x1="63" y1="55" x2="50" y2="46" stroke="#b8d432" stroke-width="1.1" opacity="0.75"/>

  <!-- AI badge top-right -->
  <circle cx="76" cy="24" r="10" fill="url(#sparkGrad)" filter="url(#glow)"/>
  <text x="76" y="28" text-anchor="middle" font-size="9" font-family="Arial Black, sans-serif" font-weight="900" fill="#ffffff" letter-spacing="0.5">AI</text>
</svg>
